services:
  api:
    build: .
    ports:
      - "127.0.0.1:3200:3000"
    environment:
      MONGODB_URI: mongodb://mongo:27017/speedtest-db
      ADMIN_TOKEN: ${ADMIN_TOKEN}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      IPINFO_TOKEN: ${IPINFO_TOKEN}
      SHODAN_KEY: ${SHODAN_KEY}
      GOOGLE_SERVICE_ACCOUNT_KEY: /app/auth/service-account.json
      CENTRAL_API_URL: ${CENTRAL_API_URL}
      SERVER_SECRET: ${SERVER_SECRET}
      EC2_KEY_NAME: ${EC2_KEY_NAME}
      AWS_SHARED_CREDENTIALS_FILE: /root/.aws/credentials
      PORT: "3000"
      NODE_ENV: production
    volumes:
      - ./auth:/app/auth:ro
      - ~/.aws:/root/.aws:ro
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  mongo:
    image: mongo:8
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: mongosh --eval "db.adminCommand('ping')"
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  mongo-data:
